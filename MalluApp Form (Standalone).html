document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

FFFFF;\n  --ink: #0B0F0D;\n  --muted: #6B7280;\n  --muted-2: #9CA3AF;\n  --line: #E5E7EB;\n  --line-soft: #F3F4F6;\n  --error: #E5484D;\n  --radius: 14px;\n}\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);\n  font-family: \"Inter\", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;\n  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;\n}\nbody { min-height: 100dvh; display: flex; flex-direction: column; }\n\n/* ── Layout shell — full-bleed everywhere; inner content capped for readability ── */\n.shell {\n  width: 100%; flex: 1; display: flex; flex-direction: column;\n  background: var(--surface); position: relative;\n}\n.progress, .body, .footer { max-width: 640px; margin-left: auto; margin-right: auto; width: 100%; }\n\n/* ── Header bar (full-bleed shadow band) ─────────────────────────── */\n.hdr-outer {\n  width: 100%; background: var(--surface);\n  border-bottom: 1px solid var(--line);\n  box-shadow: 0 1px 2px rgba(11,15,13,0.04), 0 4px 12px rgba(11,15,13,0.04);\n  position: sticky; top: 0; z-index: 10;\n}\n\n/* ── Header ─────────────────────────────────────────────────────────── */\n.hdr {\n  padding: 14px 22px;\n  max-width: 1100px; margin: 0 auto;\n  display: flex; align-items: center; justify-content: space-between; gap: 12px;\n}\n.back-row { max-width: 640px; width: 100%; margin: 22px auto 0; padding: 0 22px; }\n.progress { padding-top: 18px; }\n.brand { display: flex; align-items: center; gap: 8px; }\n.brand img { height: 40px; width: auto; display: block; }\n@media (min-width: 600px) { .brand img { height: 48px; } }\n.site-link {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-size: 12.5px; font-weight: 500; color: var(--muted);\n  text-decoration: none; padding: 8px 10px; border-radius: 8px;\n  transition: color .15s, background .15s;\n  white-space: nowrap;\n}\n.site-link:hover { color: var(--primary-dark); background: var(--primary-soft); }\n.site-link svg { color: currentColor; flex-shrink: 0; }\n.site-link .visit-label { display: none; }\n@media (min-width: 480px) { .site-link .visit-label { display: inline; } }\n.iconbtn {\n  width: 36px; height: 36px; border-radius: 10px;\n  background: var(--surface); border: 1px solid var(--line);\n  color: var(--ink); display: flex; align-items: center; justify-content: center;\n  cursor: pointer; transition: all .15s; padding: 0;\n}\n.iconbtn:hover:not(:disabled) { background: #F9FAFB; }\n.iconbtn:disabled { opacity: 0; pointer-events: none; }\n\n/* ── Progress ───────────────────────────────────────────────────────── */\n.progress { padding: 16px 22px 18px; }\n.progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }\n.progress-meta { display: flex; align-items: center; gap: 10px; }\n.progress-icon {\n  width: 32px; height: 32px; border-radius: 9px;\n  background: var(--primary-soft); color: var(--primary);\n  display: flex; align-items: center; justify-content: center;\n}\n.progress-step-no { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }\n.progress-step-name { font-size: 14.5px; font-weight: 600; color: var(--ink); margin-top: 1px; letter-spacing: -0.01em; }\n.progress-pct { font-size: 12px; color: var(--muted); font-weight: 500; font-variant-numeric: tabular-nums; }\n.progress-bar { height: 6px; background: var(--line-soft); border-radius: 999px; overflow: hidden; }\n.progress-fill {\n  height: 100%; border-radius: 999px;\n  background: linear-gradient(90deg, var(--primary), var(--primary-dark));\n  transition: width .45s cubic-bezier(.2,.8,.2,1);\n}\n\n/* ── Body ───────────────────────────────────────────────────────────── */\n.body {\n  flex: 1; overflow-y: auto; overflow-x: hidden;\n  padding: 8px 22px 14px;\n  -webkit-overflow-scrolling: touch;\n}\n.step-title { font-size: 24px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1.15; }\n.step-sub { font-size: 14px; color: var(--muted); margin-top: 6px; line-height: 1.45; margin-bottom: 22px; }\n\n.step-pane { animation: slide-in .35s cubic-bezier(.2,.8,.2,1); }\n@keyframes slide-in { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }\n.step-pane.back { animation: slide-in-back .35s cubic-bezier(.2,.8,.2,1); }\n@keyframes slide-in-back { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }\n\n/* ── Fields ─────────────────────────────────────────────────────────── */\n.field { margin-bottom: 16px; }\n.field-label-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; gap: 8px; }\n.field-label { font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }\n.field-hint { font-size: 11px; color: var(--muted); font-weight: 400; }\n.field-optional { font-size: 10.5px; color: var(--muted-2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }\n\n.input-wrap { position: relative; }\n.input, .select-btn, .textarea {\n  width: 100%; padding: 13px 14px;\n  font-size: 15px; line-height: 20px; color: var(--ink);\n  background: var(--surface); border: 1px solid var(--line);\n  border-radius: var(--radius); outline: none;\n  font-family: inherit;\n  transition: border-color .15s, box-shadow .15s;\n  -webkit-appearance: none; appearance: none;\n}\n.input::placeholder, .textarea::placeholder { color: var(--muted-2); }\n.input:focus, .select-btn:focus, .textarea:focus,\n.select-btn.open { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }\n.input.error, .select-btn.error { border-color: var(--error); box-shadow: 0 0 0 3px rgba(229,72,77,0.12); }\n.input.has-icon { padding-left: 42px; }\n.input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted-2); pointer-events: none; transition: color .15s; display: flex; }\n.input:focus ~ .input-icon, .input-wrap:focus-within .input-icon { color: var(--primary); }\n.input-right { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; }\n.textarea { resize: none; min-height: 80px; }\n.error-msg { font-size: 12px; color: var(--error); margin-top: 6px; font-weight: 500; }\n\n/* Select */\n.select-btn {\n  text-align: left; display: flex; align-items: center; justify-content: space-between;\n  cursor: pointer;\n}\n.select-btn.placeholder { color: var(--muted-2); }\n.select-btn .chev { color: var(--muted); transition: transform .15s; flex-shrink: 0; margin-left: 8px; }\n.select-btn.open .chev { transform: rotate(180deg); }\n.select-pop {\n  position: absolute; top: calc(100% + 6px); left: 0; right: 0;\n  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);\n  box-shadow: 0 12px 32px rgba(11,15,13,0.12), 0 2px 6px rgba(11,15,13,0.04);\n  max-height: 240px; overflow-y: auto; z-index: 20; padding: 4px;\n}\n.select-opt {\n  width: 100%; text-align: left; padding: 10px 12px;\n  border: none; background: transparent; border-radius: 8px;\n  cursor: pointer; font-size: 14px; color: var(--ink); font-family: inherit; font-weight: 500;\n}\n.select-opt:hover { background: var(--line-soft); }\n.select-opt.active { background: var(--primary-soft); }\n\n/* Day chips (weekly off, multi-select) */\n.day-chips { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }\n@media (min-width: 480px) { .day-chips { grid-template-columns: repeat(7, 1fr); } }\n.day-chip {\n  appearance: none; -webkit-appearance: none;\n  padding: 12px 8px; font-family: inherit; font-size: 13px; font-weight: 600;\n  background: var(--surface); border: 1px solid var(--line); border-radius: 10px;\n  color: var(--ink); cursor: pointer;\n  transition: all .15s; user-select: none;\n  display: flex; align-items: center; justify-content: center; gap: 6px;\n}\n.day-chip:hover { border-color: #D1D5D file's name + size; if you want the actual file content delivered\n  // to your endpoint, switch to multipart/form-data.\n  const slim = (f) => f && { name: f.name, size: f.size, dataUrl: f.dataUrl };\n  const appId = 'MA-' + Math.floor(100000 + Math.random() * 900000);\n  const payload = {\n    appId,\n    submittedAt: new Date().toISOString(),\n    source: 'malluapp-onboarding',\n    shopName: state.data.shopName || '',\n    category: state.data.category || '',\n    description: state.data.description || '',\n    phone: state.data.phone || '',\n    email: state.data.email || '',\n    address: state.data.address || '',\n    pincode: state.data.pincode || '',\n    gps: state.data.gps || '',\n    openTime: state.data.openTime || '',\n    closeTime: state.data.closeTime || '',\n    holidays: Array.isArray(state.data.holidays) ? state.data.holidays : [],\n    logo: slim(state.data.logo),\n    frontPhoto: slim(state.data.frontPhoto),\n    ownerName: state.data.ownerName || '',\n    upi: state.data.upi || '',\n    userAgent: navigator.userAgent,\n  };\n\n  try {\n    if (!WEBHOOK_URL) {\n      // No endpoint configured — local-only fallback. Stash entry + still show\n      // success so the owner gets a confirmation.\n      console.warn('[MalluApp] WEBHOOK_URL not configured. Entry stored locally only.');\n      const log = JSON.parse(localStorage.getItem('malluapp-submissions') || '[]');\n      log.push(payload);\n      localStorage.setItem('malluapp-submissions', JSON.stringify(log));\n    } else {\n      // Use text/plain to avoid CORS preflight (Apps Script and most simple\n      // endpoints accept this). The body is still JSON.\n      const res = await fetch(WEBHOOK_URL, {\n        method: 'POST',\n        headers: { 'Content-Type': 'text/plain;charset=utf-8' },\n        body: JSON.stringify(payload),\n      });\n      if (!res.ok) throw new Error('Server returned ' + res.status);\n    }\n    state.appId = appId;\n    state.done = true;\n    state.submitting = false;\n    localStorage.removeItem('malluapp-draft');\n    render();\n  } catch (err) {\n    console.error('[MalluApp] Submit failed:', err);\n    state.submitting = false;\n    state.submitError = \"Couldn't send your submission. Check your internet and try again.\";\n    render();\n  }\n}\n\n//─────────────────────────────────────────────────────────────────────────\n// Render — full re-render on state change\n//─────────────────────────────────────────────────────────────────────────\nfunction render() {\n  if (state.done) {\n    renderSuccess();\n    return;\n  }\n\n  // Header back button\n  const back1 = document.getElementById('back-btn');\n  back1.disabled = state.step === 0;\n  back1.onclick = goBack;\n\n  // Progress\n  const pct = Math.round(((state.step + 1) / STEPS.length) * 100);\n  document.getElementById('progress-no').textContent = `Step ${state.step + 1} of ${STEPS.length}`;\n  document.getElementById('progress-name').textContent = STEPS[state.step].name;\n  document.getElementById('progress-pct').textContent = pct + '%';\n  document.getElementById('progress-fill').style.width = pct + '%';\n  document.getElementById('progress-icon').innerHTML =\n    `<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" ${stroke}>${STEPS[state.step].icon}<\u002Fsvg>`;\n\n  // Body\n  const body = document.getElementById('body');\n  body.innerHTML = '';\n  body.appendChild(PANES[state.step]());\n  body.scrollTop = 0;\n\n  // Footer\n  const back2 = document.getElementById('back-btn-2');\n  back2.style.display = state.step > 0 ? 'inline-flex' : 'none';\n  back2.onclick = goBack;\n\n  const next = document.getElementById('next-btn');\n  next.disabled = state.submitting;\n  next.textContent = state.submitting\n    ? 'Submitting…'\n    : (state.step === STEPS.length - 1 ? 'Submit Application' : 'Continue');\n  next.onclick = goNext;\n}\n\nfunction renderSuccess() {\n  const shell = document.getElementById('shell');\n  shell.innerHTML = '';\n\n  const success = el('div', {
